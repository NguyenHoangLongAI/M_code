<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>C → C# Migration Tool — AWS Bedrock + Neo4j</title>
<style>
:root {
  --bg:#0d1117; --s1:#161b22; --s2:#1c2128; --s3:#21262d;
  --bd:#30363d; --bd2:#3d444d;
  --green:#3fb950; --blue:#58a6ff; --yellow:#d29922;
  --red:#f85149; --orange:#f0883e; --purple:#bc8cff;
  --teal:#39d1c5; --neo4j:#018BFF;
  --create:#2dd4bf; --call:#60a5fa; --system:#6b7280;
  --text:#e6edf3; --dim:#8b949e; --dim2:#656d76;
  --mono:'Cascadia Code','Fira Code',Consolas,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer;border-radius:6px;border:1px solid var(--bd);font-weight:600;transition:all .15s}
button:disabled{opacity:.35;cursor:not-allowed}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ── HEADER ── */
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);height:48px;padding:0 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-title{font-size:14px;font-weight:700}
.hdr-title em{color:var(--blue);font-style:normal}
.chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap}
.chip-bedrock{color:var(--teal);border-color:rgba(57,209,197,.4);background:rgba(57,209,197,.1)}
.chip-model{color:var(--purple);border-color:rgba(188,140,255,.4);background:rgba(188,140,255,.1)}
.chip-ok{color:var(--green);border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.1)}
.chip-err{color:var(--red);border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.1)}
.chip-connecting{color:var(--blue);border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.1)}
.chip-neo4j{color:var(--neo4j);border-color:rgba(1,139,255,.4);background:rgba(1,139,255,.1)}
.chip-neo4j-err{color:var(--red);border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.08)}
.chip-nollm{color:var(--yellow);border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.1)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-server-url{font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--s3);border:1px solid var(--bd);border-radius:4px;padding:3px 8px;outline:none;width:175px;transition:border-color .15s}
.hdr-server-url:focus{border-color:var(--blue)}
.btn-sm{font-size:11px;padding:3px 10px;background:transparent;color:var(--text)}
.btn-sm:hover{background:var(--s3)}

/* ── LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden}

/* ══════════════════════════════════════════════
   FUNC KIND CHIP STYLES  (v2.0)
   ══════════════════════════════════════════════ */
/* base dep chip */
.dep-call-chip{
  display:inline-flex;align-items:center;gap:3px;
  font-family:var(--mono);font-size:9px;padding:1px 5px;
  border-radius:4px;margin:1px 2px 1px 0;cursor:pointer;
  border:1px solid;white-space:nowrap;transition:opacity .15s;
}
.dep-call-chip:hover{opacity:.75}

/* func_kind == "call" → blue */
.fk-call{
  color:var(--call);border-color:rgba(96,165,250,.45);
  background:rgba(96,165,250,.1);
}
/* func_kind == "create" → teal/green */
.fk-create{
  color:var(--create);border-color:rgba(45,212,191,.5);
  background:rgba(45,212,191,.12);font-weight:700;
}
/* func_kind == "system" → muted gray */
.fk-system{
  color:var(--system);border-color:rgba(107,114,128,.4);
  background:rgba(107,114,128,.08);
}
/* has definition link badge */
.chip-def-badge{
  display:inline-block;font-size:8px;padding:0 3px;border-radius:3px;
  background:rgba(63,185,80,.25);color:var(--green);margin-left:2px;vertical-align:middle;
}
/* kind badge for CREATE */
.chip-create-badge{
  display:inline-block;font-size:8px;padding:0 3px;border-radius:3px;
  background:rgba(45,212,191,.25);color:var(--create);margin-left:2px;vertical-align:middle;
}
/* caller chips */
.fk-caller-call{
  color:#a78bfa;border-color:rgba(167,139,250,.45);
  background:rgba(167,139,250,.1);
}
.fk-caller-create{
  color:#34d399;border-color:rgba(52,211,153,.45);
  background:rgba(52,211,153,.1);font-weight:700;
}
.fk-caller-system{
  color:var(--system);border-color:rgba(107,114,128,.35);
  background:rgba(107,114,128,.06);
}

/* func-kind legend in bottom-bar */
.fk-legend{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--dim2)}
.fk-dot{display:inline-block;width:7px;height:7px;border-radius:50%}
.fk-dot-call{background:var(--call)}
.fk-dot-create{background:var(--create)}
.fk-dot-system{background:var(--system)}

/* func-kind summary badges in review panel */
.rp-fk-row{display:flex;flex-direction:column;gap:3px;margin-top:2px}
.rp-fk-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim2)}
.rp-fk-chips{display:flex;flex-wrap:wrap;gap:3px;min-height:16px}

/* ── SIDEBAR ── */
.sidebar{width:240px;min-width:240px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:8px 10px 4px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--bd)}
.sb-hdr-top{display:flex;align-items:center;gap:6px}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--dim2);flex:1}
.sb-sel-count{font-size:10px;color:var(--blue);font-weight:700}
.sb-search{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--text);font-size:11px;padding:4px 8px;outline:none;transition:border-color .15s}
.sb-search:focus{border-color:var(--blue)}
.sb-search::placeholder{color:var(--dim2)}
.file-tree{flex:1;overflow-y:auto;padding:4px 0}
.tree-dir{display:flex;align-items:center;gap:5px;padding:4px 8px;cursor:pointer;user-select:none;border-radius:5px;margin:0 4px 1px;transition:background .1s}
.tree-dir:hover{background:var(--s2)}
.dir-toggle{font-size:9px;color:var(--dim2);width:12px;flex-shrink:0;transition:transform .15s;display:inline-block;text-align:center}
.dir-toggle.open{transform:rotate(90deg)}
.dir-icon{font-size:13px;flex-shrink:0}
.dir-label{font-size:11.5px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dir-badge{font-size:9px;color:var(--dim2);background:var(--s3);border-radius:8px;padding:1px 5px;white-space:nowrap;flex-shrink:0}
.dir-badge.has-sel{color:var(--blue);background:rgba(88,166,255,.12)}
.tree-children{overflow:hidden;transition:max-height .2s ease}
.tree-children.collapsed{max-height:0!important}
.tree-file{display:flex;align-items:center;gap:5px;padding:4px 8px 4px 0;cursor:pointer;border-radius:5px;margin:0 4px 1px;border:1px solid transparent;transition:background .1s}
.tree-file:hover{background:var(--s2)}
.tree-file.active-view{background:rgba(88,166,255,.12);border-color:rgba(88,166,255,.35)}
.tree-file.db-cached{border-color:rgba(1,139,255,.3);background:rgba(1,139,255,.05)}
.tree-file .fi-cb{width:14px;height:14px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-left:8px}
.tree-file .fi-icon{font-size:12px;flex-shrink:0}
.tree-file .fi-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.tree-file .fi-badge{font-size:9px;padding:1px 4px;border-radius:8px;background:var(--s3);color:var(--dim);white-space:nowrap;flex-shrink:0}
.tree-file .fi-badge.done{background:rgba(63,185,80,.15);color:var(--green)}
.tree-file .fi-badge.db{background:rgba(1,139,255,.15);color:var(--neo4j)}
.tree-file .fi-badge.busy{background:rgba(88,166,255,.15);color:var(--blue);animation:pulse 1s infinite}
.tree-file .fi-badge.err{background:rgba(248,81,73,.15);color:var(--red)}
.sb-actions{padding:7px 8px;border-top:1px solid var(--bd);display:flex;gap:5px;flex-shrink:0}
.btn-sel-all{flex:1;font-size:10.5px;padding:4px 4px;background:transparent;color:var(--dim)}
.btn-sel-all:hover{background:var(--s3);color:var(--text)}
.btn-run-sel{flex:2;font-size:11px;padding:4px 8px;background:var(--blue);color:#0d1117;border-color:var(--blue)}
.btn-run-sel:hover:not(:disabled){opacity:.85}
.sb-cg-row{padding:5px 8px;border-top:1px solid var(--bd);flex-shrink:0}
.btn-cg{width:100%;font-size:10.5px;padding:4px 8px;background:transparent;color:var(--purple);border-color:rgba(188,140,255,.4)}
.btn-cg:hover:not(:disabled){background:rgba(188,140,255,.08)}
.btn-cg.running{animation:pulse 1s infinite}
.sb-bedrock-info{padding:7px 12px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;flex-direction:column;gap:3px}
.sb-bedrock-row{display:flex;align-items:center;justify-content:space-between;font-size:10px}
.sb-bedrock-label{color:var(--dim2);text-transform:uppercase;letter-spacing:.4px}
.sb-bedrock-val{color:var(--text);font-family:var(--mono);font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-bedrock-val.ok{color:var(--green)}
.sb-bedrock-val.err{color:var(--red)}
.sb-bedrock-val.neo{color:var(--neo4j)}
.sb-bedrock-val.nollm{color:var(--yellow)}
.sb-db-bar{padding:5px 8px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:5px}
.db-stats-chip{font-size:9px;color:var(--dim2);white-space:nowrap}

/* ── WORKSPACE ── */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tab-bar{background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 8px;gap:2px;flex-shrink:0;overflow-x:auto;min-height:38px}
.tab-bar::-webkit-scrollbar{height:3px}
.view-tab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px 6px 0 0;font-size:11.5px;cursor:pointer;color:var(--dim);border:1px solid transparent;border-bottom:none;white-space:nowrap;transition:all .15s;flex-shrink:0}
.view-tab:hover{color:var(--text);background:var(--s2)}
.view-tab.active{color:var(--text);background:var(--bg);border-color:var(--bd)}
.view-tab .tab-close{font-size:12px;color:var(--dim2);margin-left:2px;line-height:1;padding:1px 3px;border-radius:3px}
.view-tab .tab-close:hover{color:var(--red);background:rgba(248,81,73,.15)}
.view-tab .tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-idle{background:var(--dim2)}.dot-run{background:var(--blue);animation:pulse 1s infinite}
.dot-done{background:var(--green)}.dot-err{background:var(--red)}.dot-db{background:var(--neo4j)}
.tab-bar-empty{padding:0 14px;font-size:11.5px;color:var(--dim);display:flex;align-items:center}
.view-panels{flex:1;overflow:hidden;position:relative}
.view-panel{display:none;flex-direction:column;height:100%;overflow:hidden}
.view-panel.active{display:flex}
.welcome-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim)}
.welcome-panel svg{opacity:.12}
.welcome-title{font-size:14px;font-weight:700;color:var(--dim)}
.welcome-sub{font-size:12px}

/* ── FILE PANEL ── */
.file-action-bar{background:var(--s2);border-bottom:1px solid var(--bd);padding:6px 12px;display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn-run-f{padding:4px 14px;font-size:12px;background:var(--blue);color:#0d1117;border-color:var(--blue)}
.btn-run-f:hover:not(:disabled){opacity:.85}
.btn-cancel-f{padding:4px 10px;font-size:12px;background:transparent;color:var(--red);border-color:var(--red);display:none}
.btn-cancel-f:hover{background:rgba(248,81,73,.1)}
.btn-clear-f{padding:4px 8px;font-size:11px;background:transparent;color:var(--dim)}
.btn-clear-f:hover{color:var(--text);background:var(--s3)}
.btn-dl{font-size:11px;padding:3px 8px;background:transparent;color:var(--green);border-color:var(--green)}
.btn-dl:hover{background:rgba(63,185,80,.1)}
.btn-dl.blue{color:var(--blue);border-color:var(--blue)}
.btn-dl.blue:hover{background:rgba(88,166,255,.1)}
.btn-db-del{font-size:11px;padding:3px 8px;background:transparent;color:var(--red);border-color:rgba(248,81,73,.4);display:none}
.btn-db-del:hover{background:rgba(248,81,73,.1)}
.f-status{font-size:11px;color:var(--dim);margin-left:auto}
.f-status.run{color:var(--blue)}.f-status.ok{color:var(--green)}.f-status.err{color:var(--red)}.f-status.db{color:var(--neo4j)}
.f-src-badge{font-size:9px;padding:1px 5px;border-radius:8px;white-space:nowrap}
.f-src-badge.from-db{background:rgba(1,139,255,.15);color:var(--neo4j);border:1px solid rgba(1,139,255,.3)}
.f-src-badge.from-run{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.f-pipeline{background:var(--s2);border-bottom:1px solid var(--bd);padding:4px 12px;display:flex;align-items:center;gap:3px;flex-shrink:0;overflow-x:auto}
.ag{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;border:1px solid var(--bd);font-size:10px;white-space:nowrap;color:var(--dim);transition:all .2s}
.ag .n{font-weight:700}
.ag.run{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.08)}
.ag.run::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--blue);margin-right:3px;animation:pulse 1s infinite}
.ag.done{border-color:var(--green);color:var(--green);background:rgba(63,185,80,.08)}
.ag.db{border-color:var(--neo4j);color:var(--neo4j);background:rgba(1,139,255,.08)}
.ag.err{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.08)}
.ag.nollm{border-color:var(--yellow);color:var(--yellow);background:rgba(210,153,34,.08)}
.ag-sep{color:var(--bd);font-size:11px}
.f-elapsed{margin-left:auto;font-size:10px;color:var(--dim);font-family:var(--mono)}
.top-section{flex:0 0 55%;display:flex;overflow:hidden;border-bottom:2px solid var(--bd2);min-height:0}
.code-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.code-pane+.code-pane{border-left:2px solid var(--bd2)}
.pane-bar{background:var(--s2);border-bottom:1px solid var(--bd);padding:4px 11px;display:flex;align-items:center;gap:6px;font-size:11px;flex-shrink:0;height:30px}
.pb-label{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:4px;white-space:nowrap}
.pb-c{background:rgba(240,136,62,.15);color:var(--orange);border:1px solid rgba(240,136,62,.3)}
.pb-cs{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3)}
.pb-name{font-family:var(--mono);font-size:10.5px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.pb-meta{font-size:10px;color:var(--dim2);white-space:nowrap}
.pb-pin{font-size:10px;color:var(--dim)}
.code-view{flex:1;overflow:auto;font-family:var(--mono);font-size:12px;line-height:1.65;background:var(--bg)}
.code-lines{padding:6px 0;min-height:100%}
.code-line{display:flex;min-height:1.65em}
.code-line:hover{background:rgba(255,255,255,.02)}
.line-num{width:44px;min-width:44px;text-align:right;padding:0 9px 0 5px;color:var(--dim2);font-size:10px;user-select:none;flex-shrink:0}
.line-body{flex:1;padding-right:14px;white-space:pre;color:var(--text)}
.code-view.cs .line-body{color:#c9d1d9}
.code-line.hl-active .line-num{color:var(--blue)}
.code-line.hl-active .line-body{background:rgba(88,166,255,.18);border-left:3px solid var(--blue);padding-left:1px}
.code-line.hl-range .line-body{background:rgba(88,166,255,.07)}
.code-line.hl-cs-active .line-num{color:var(--green)}
.code-line.hl-cs-active .line-body{background:rgba(63,185,80,.18);border-left:3px solid var(--green);padding-left:1px}
.code-line.hl-cs-range .line-body{background:rgba(63,185,80,.07)}
.resize-h{height:4px;background:var(--bd);cursor:row-resize;flex-shrink:0;transition:background .15s}
.resize-h:hover,.resize-h.dragging{background:var(--blue)}
.bottom-section{flex:1;display:flex;overflow:hidden;min-height:0}
.tbl-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.bottom-bar{background:var(--s2);border-bottom:1px solid var(--bd);padding:4px 11px;display:flex;align-items:center;gap:7px;flex-shrink:0;height:32px}
.bb-title{font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.badge{background:var(--s3);border-radius:10px;padding:1px 6px;font-size:10px}
.badge.has{background:rgba(63,185,80,.2);color:var(--green)}
.badge.warn{background:rgba(210,153,34,.2);color:var(--yellow)}
.badge.dep{background:rgba(188,140,255,.15);color:var(--purple)}
.badge.dep-pending{background:rgba(88,166,255,.1);color:var(--blue);animation:pulse 1.5s infinite}
.log-overlay{display:none;flex-direction:column;overflow:hidden;flex:1}
.log-overlay.visible{display:flex}
.log-scroll{flex:1;overflow-y:auto;padding:7px 11px;font-family:var(--mono);font-size:11px}
.log-line{line-height:1.8;display:flex;gap:6px}
.log-ts{color:var(--dim2);font-size:10px;flex-shrink:0;padding-top:1px}
.log-msg{flex:1;word-break:break-word}
.l-step{color:var(--blue);font-weight:700}.l-ok{color:var(--green)}.l-warn{color:var(--yellow)}.l-err{color:var(--red)}.l-sub{color:var(--dim)}.l-db{color:var(--neo4j)}
.tbl-wrap{flex:1;overflow:auto;display:none}
.tbl-wrap.visible{display:block}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:var(--s2);color:var(--dim);font-weight:600;padding:5px 8px;border:1px solid var(--bd);position:sticky;top:0;z-index:2;white-space:nowrap;font-size:10px}
tbody td{padding:4px 8px;border:1px solid var(--bd);vertical-align:top;cursor:default}
tbody tr:hover td{background:rgba(88,166,255,.04)}
tbody tr.row-selected td{background:rgba(88,166,255,.1)!important}
tbody tr.row-selected td:first-child{border-left:2px solid var(--blue)}
.c-src{font-family:var(--mono);font-size:10px;color:#79c0ff;white-space:pre;max-width:160px;overflow-x:auto;display:block}
.c-cs{font-family:var(--mono);font-size:10px;color:#56d364;white-space:pre;max-width:160px;overflow-x:auto;display:block}
.diff-e{color:var(--green)}.diff-m{color:var(--yellow)}.diff-h{color:var(--orange)}.diff-x{color:var(--red)}
.risk-l{color:var(--green)}.risk-m{color:var(--yellow)}.risk-h{color:var(--orange)}.risk-x{color:var(--red)}
.rev-yes{color:var(--yellow)}
.rs-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;border:1px solid;white-space:nowrap}
.rs-ok{color:var(--green);border-color:rgba(63,185,80,.5);background:rgba(63,185,80,.1)}
.rs-fix{color:var(--yellow);border-color:rgba(210,153,34,.5);background:rgba(210,153,34,.1)}
.rs-reject{color:var(--red);border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.1)}
.rs-none{color:var(--dim);border-color:var(--bd);background:transparent}
.map-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.4);white-space:nowrap;cursor:pointer}
.map-badge:hover{background:rgba(63,185,80,.3)}
.review-panel{width:0;min-width:0;overflow:hidden;background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;transition:width .22s ease,min-width .22s ease;flex-shrink:0}
.review-panel.open{width:320px;min-width:320px}
.rp-hdr{padding:9px 13px 7px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:7px}
.rp-title{font-size:12px;font-weight:700;flex:1}
.rp-id{font-size:10px;color:var(--dim);font-family:var(--mono)}
.rp-close{background:transparent;border:none;color:var(--dim);font-size:15px;padding:0 2px;line-height:1;cursor:pointer}
.rp-close:hover{color:var(--text)}
.rp-body{flex:1;overflow-y:auto;padding:10px 13px;display:flex;flex-direction:column;gap:10px}
.rp-field{display:flex;flex-direction:column;gap:3px}
.rp-label{font-size:10px;font-weight:600;color:var(--dim)}
.rp-status-row{display:flex;gap:5px}
.rp-status-btn{flex:1;padding:4px 3px;font-size:10.5px;font-weight:700;background:var(--s2);color:var(--dim);border:1px solid var(--bd);border-radius:6px;cursor:pointer;transition:all .15s;text-align:center}
.rp-status-btn:hover{background:var(--s3);color:var(--text)}
.rp-status-btn.sel-ok{background:rgba(63,185,80,.15);color:var(--green);border-color:rgba(63,185,80,.5)}
.rp-status-btn.sel-fix{background:rgba(210,153,34,.15);color:var(--yellow);border-color:rgba(210,153,34,.5)}
.rp-status-btn.sel-reject{background:rgba(248,81,73,.15);color:var(--red);border-color:rgba(248,81,73,.5)}
.rp-textarea{width:100%;min-height:70px;resize:vertical;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:11.5px;line-height:1.5;padding:7px 9px;outline:none;transition:border-color .15s}
.rp-textarea:focus{border-color:var(--blue)}
.rp-mono{font-family:var(--mono);font-size:10.5px}
.rp-field-row{flex-direction:row;align-items:center;gap:8px}
.rp-field-row .rp-label{min-width:72px;flex-shrink:0}
.rp-select{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--text);font-size:11.5px;padding:4px 7px;outline:none;cursor:pointer;transition:border-color .15s}
.rp-select:focus{border-color:var(--blue)}
.rp-select option{background:var(--s2)}
/* func-kind section in review panel */
.rp-fk-section{background:var(--s2);border-radius:6px;border:1px solid var(--bd);padding:8px 10px;display:flex;flex-direction:column;gap:8px}
.rp-dep-empty{font-size:10px;color:var(--dim2);font-style:italic}
.rp-dep-pending{font-size:10px;color:var(--blue);font-style:italic;animation:pulse 1.5s infinite}
.rp-foot{padding:8px 13px;border-top:1px solid var(--bd);display:flex;gap:6px;flex-shrink:0}
.rp-save{flex:1;padding:5px;font-size:11.5px;background:var(--blue);color:#0d1117;border-color:var(--blue)}
.rp-save:hover{opacity:.85}
.rp-nav{padding:5px 9px;font-size:11.5px;background:transparent;color:var(--dim)}
.rp-nav:hover:not(:disabled){background:var(--s3);color:var(--text)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--dim);font-size:12px}
.empty-state svg{opacity:.15}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
</style>
</head>
<body>

<header class="hdr">
  <span style="font-size:18px">⚙️</span>
  <div class="hdr-title">C / Pro*C <em>→</em> C# Migration Tool</div>
  <span class="chip chip-bedrock">☁ AWS Bedrock</span>
  <span class="chip chip-nollm" title="Agent 4: rule-based assembly, no LLM">⚡ Agent4=NoLLM</span>
  <span class="chip chip-model" id="modelChip">⬤ —</span>
  <span class="chip chip-neo4j-err" id="neo4jChip" title="Neo4j DB" style="cursor:pointer" onclick="openNeo4jBrowser()">🗄 Neo4j —</span>
  <div class="hdr-right">
    <span id="srvChip" class="chip chip-err">⬤ オフライン</span>
    <input id="srvUrl" class="hdr-server-url" value="http://127.0.0.1:5005" spellcheck="false">
    <button class="btn-sm" onclick="pingServer()">↺ 接続確認</button>
  </div>
</header>

<div class="body">
  <aside class="sidebar">
    <div class="sb-hdr">
      <div class="sb-hdr-top">
        <span class="sb-title">📁 tests/</span>
        <span class="sb-sel-count" id="selCount"></span>
      </div>
      <input class="sb-search" id="sbSearch" placeholder="ファイル検索…" oninput="onSearch(this.value)">
    </div>
    <div class="file-tree" id="fileTree">
      <div style="padding:12px 8px;font-size:11px;color:var(--dim)">接続中…</div>
    </div>
    <div class="sb-actions">
      <button class="btn-sel-all" onclick="toggleSelectAll()">全選択</button>
      <button class="btn-run-sel" id="btnRunSel" onclick="runSelected()" disabled>▶ 選択実行</button>
    </div>
    <div class="sb-cg-row">
      <button class="btn-cg" id="btnCallGraph" onclick="triggerCallGraph()" disabled>⇄ 依存関係分析</button>
    </div>
    <div class="sb-bedrock-info">
      <div class="sb-bedrock-row"><span class="sb-bedrock-label">Provider</span><span class="sb-bedrock-val" style="color:var(--teal)">AWS Bedrock</span></div>
      <div class="sb-bedrock-row"><span class="sb-bedrock-label">Agent 4</span><span class="sb-bedrock-val nollm">Rule-based</span></div>
      <div class="sb-bedrock-row"><span class="sb-bedrock-label">Region</span><span class="sb-bedrock-val" id="sbRegion">—</span></div>
      <div class="sb-bedrock-row"><span class="sb-bedrock-label">API Calls</span><span class="sb-bedrock-val" id="sbCalls">0</span></div>
      <div class="sb-bedrock-row"><span class="sb-bedrock-label">Neo4j</span><span class="sb-bedrock-val" id="sbNeo4j">—</span></div>
      <div class="sb-bedrock-row"><span class="sb-bedrock-label">DB Files</span><span class="sb-bedrock-val" id="sbDbFiles">—</span></div>
    </div>
    <div class="sb-db-bar">
      <span class="db-stats-chip" id="dbStatsChip"></span>
    </div>
  </aside>

  <div class="workspace">
    <div class="tab-bar" id="tabBar">
      <div class="tab-bar-empty" id="tabBarEmpty">← ファイルを選択して開く</div>
    </div>
    <div class="view-panels" id="viewPanels">
      <div class="view-panel active" id="panel-welcome">
        <div class="welcome-panel">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <div class="welcome-title">C → C# Migration Tool v7 (Agent4=NoLLM)</div>
          <div class="welcome-sub">関数分類: <span style="color:var(--call)">●call</span> <span style="color:var(--create)">●create</span> <span style="color:var(--system)">●system</span> — クリックで定義元にジャンプ</div>
        </div>
      </div>
    </div>
  </div>
</div>

<template id="panelTpl">
  <div class="view-panel" id="panel-__SID__">
    <div class="file-action-bar">
      <button class="btn-run-f" id="btnRun-__SID__" onclick="startOne('__PATH__')">▶ 実行</button>
      <button class="btn-cancel-f" id="btnCancel-__SID__" onclick="cancelOne('__PATH__')">✕ キャンセル</button>

    <div class="top-section" id="topSection-__SID__">
      <div class="code-pane">
        <div class="pane-bar">
          <span class="pb-label pb-c">C / Pro*C</span>

          <span class="pb-meta" id="srcMeta-__SID__"></span>
          <span class="pb-pin" id="srcPin-__SID__"></span>
        </div>
        <div class="code-view" id="srcCode-__SID__">

          <span class="pb-pin" id="csPin-__SID__"></span>

    <div class="bottom-section" id="bottomSection-__SID__">
      <div class="tbl-area">
        <div class="bottom-bar">
          <span class="bb-title">📊 パターン分析</span>
          <span class="badge" id="csvBadge-__SID__">0</span>
          <span class="badge warn" id="reviewBadge-__SID__" style="display:none">0 件未レビュー</span>
          <span class="badge dep" id="depBadge-__SID__" style="display:none">⇄ —</span>
          <span style="margin-left:8px;font-size:10px;color:var(--green)" id="mapStatus-__SID__"></span>
          <!-- func-kind legend -->
          <span class="fk-legend" style="margin-left:12px">
            <span class="fk-dot fk-dot-call"></span><span>call</span>
            <span class="fk-dot fk-dot-create" style="margin-left:4px"></span><span>create</span>
            <span class="fk-dot fk-dot-system" style="margin-left:4px"></span><span>system</span>
          </span>
          <div style="margin-left:auto">
            <button class="btn-dl" onclick="dlCSV('__PATH__')" style="font-size:10px;padding:2px 7px">⬇ CSV</button>
          </div>
        </div>
        <div class="log-overlay visible" id="logOverlay-__SID__">
          <div class="log-scroll" id="logScroll-__SID__">
            <div class="empty-state" id="logEmpty-__SID__">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
              <div>▶ 実行 または DBからロード中…</div>
            </div>
          </div>
        </div>
        <div class="tbl-wrap" id="tblWrap-__SID__">
          <table><thead><tr id="csvHead-__SID__"></tr></thead><tbody id="csvBody-__SID__"></tbody></table>
        </div>
      </div>
      <!-- Review panel -->
      <div class="review-panel" id="reviewPanel-__SID__">
        <div class="rp-hdr">
          <div><div class="rp-title">📝 レビュー</div><div class="rp-id" id="rpId-__SID__">—</div></div>
          <button class="rp-close" onclick="closeReview('__PATH__')">✕</button>
        </div>
        <div class="rp-body">
          <div class="rp-field">
            <div class="rp-label">レビューステータス</div>
            <div class="rp-status-row">
              <button class="rp-status-btn" id="rsOk-__SID__"     onclick="setStatusR('__PATH__','ok')">✓ 承認</button>
              <button class="rp-status-btn" id="rsFix-__SID__"    onclick="setStatusR('__PATH__','fix')">△ 要修正</button>
              <button class="rp-status-btn" id="rsReject-__SID__" onclick="setStatusR('__PATH__','reject')">✕ 却下</button>

          <div class="rp-field"><div class="rp-label">概要</div><textarea class="rp-textarea" id="rp_summary-__SID__" rows="3"></textarea></div>

              <option>易しい</option><option>普通</option><option>難しい</option><option>非常に難しい</option>

            <select class="rp-select" id="rp_risk_level-__SID__"><option>低</option><option>中</option><option>高</option><option>非常に高い</option></select>
          </div>

          </div>

            <select class="rp-select" id="rp_popularity-__SID__">
              <option value="1">1/5</option><option value="2">2/5</option><option value="3" selected>3/5</option><option value="4">4/5</option><option value="5">5/5</option>
            </select>
          </div>
          <!-- func-kind dependency section (v2.0) -->
          <div class="rp-fk-section" id="rpFkSec-__SID__" style="display:none">

              <div class="rp-fk-label">🔵 Function Calls (call)</div>
              <div class="rp-fk-chips" id="rpFkCalls-__SID__"></div>

            <div class="rp-fk-row">
              <div class="rp-fk-label">🟢 Creates / Inits (create)</div>
              <div class="rp-fk-chips" id="rpFkCreates-__SID__"></div>
            </div>
            <div class="rp-fk-row">
              <div class="rp-fk-label">⬜ System / stdlib (system)</div>
              <div class="rp-fk-chips" id="rpFkSystem-__SID__"></div>
            </div>
            <div style="border-top:1px solid var(--bd);margin-top:4px;padding-top:6px">
              <div class="rp-fk-label" style="margin-bottom:3px">📥 Callers of this function</div>

<script>
'use strict';

/* ════ STATE ════ */
const fileStates={};const cache={};let activePanel='welcome';
const POLL_MS=30000,CG_RETRY_DELAY_MS=12000,CG_RETRY_MAX=10;
const dirOpen={};const dbCachedFiles={};
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ts=()=>new Date().toLocaleTimeString('ja-JP',{hour12:false});
function serverUrl(){return ($('srvUrl').value||'http://127.0.0.1:5005').replace(/\/$/,'');}
function safeId(path){return path.replace(/[^a-zA-Z0-9_-]/g,'_');}

function getState(path){
  if(!fileStates[path])fileStates[path]={
    srcLines:[],csLinesArr:[],patterns:[],csText:'',
    reviews:{},activeReviewId:null,sse:null,running:false,startTs:0,
    hasDeps:false,depRetryTimer:null,depRetryCount:0,loadedFromDb:false,
  };
  return fileStates[path];
}

/* ════ SERVER ════ */
async function pingServer(){
  $('srvChip').textContent='⬤ 接続中…';$('srvChip').className='chip chip-connecting';
  try{
    const r=await fetch(serverUrl()+'/health',{signal:AbortSignal.timeout(4000)});
    const d=await r.json();
    $('srvChip').textContent='⬤ オンライン';$('srvChip').className='chip chip-ok';
    const ms=(d.model||'').replace('au.anthropic.','').replace('anthropic.','').replace('-v1:0','');
    $('modelChip').textContent='⬤ '+ms;
    const pool=d.key_pool||{};
    $('sbRegion').textContent=pool.region||d.region||'—';
    $('sbCalls').textContent=pool.total_calls??0;
    const neo=d.neo4j||{};updateNeo4jChip(neo.ok,neo.uri||neo.reason||'');
    await loadFileList();await loadDbFileList();
  }catch(_){
    $('srvChip').textContent='⬤ オフライン';$('srvChip').className='chip chip-err';
    $('modelChip').textContent='⬤ —';updateNeo4jChip(false,'offline');
    $('fileTree').innerHTML=`<div style="padding:10px 8px;font-size:11px;color:var(--dim);line-height:2">⚠ サーバー未起動<br><code style="color:var(--yellow)">python server.py</code></div>`;
  }
}
function updateNeo4jChip(ok,detail){
  const chip=$('neo4jChip');
  if(ok){chip.textContent='🗄 Neo4j ✓';chip.className='chip chip-neo4j';chip.title='Neo4j接続済み: '+detail;$('sbNeo4j').textContent='接続済み';$('sbNeo4j').className='sb-bedrock-val neo';}
  else{chip.textContent='🗄 Neo4j ✗';chip.className='chip chip-neo4j-err';chip.title='Neo4j未接続: '+detail;$('sbNeo4j').textContent='未接続';$('sbNeo4j').className='sb-bedrock-val err';}
}
function openNeo4jBrowser(){window.open('http://localhost:7474/browser/','_blank');}

async function loadDbFileList(){
  try{
    const r=await fetch(serverUrl()+'/api/db/files');const d=await r.json();
    (d.files||[]).forEach(f=>{dbCachedFiles[f.path]=f;});
    $('sbDbFiles').textContent=d.count??'—';
    const sr=await fetch(serverUrl()+'/api/db/stats');const stats=await sr.json();
    if(stats.ok){
      // v2.0: show call/create edge counts
      const callE=stats.call_edges??'';const createE=stats.create_edges??'';
      const extra=callE!==''?` ▸${callE}c/${createE}cr`:'';
      $('dbStatsChip').textContent=`${stats.files}f · ${stats.patterns}p · ${stats.edges}e${extra}`;
    }
    reRenderDbBadges();
  }catch(e){console.debug('[DB]',e.message);}
}
function reRenderDbBadges(){
  Object.keys(dbCachedFiles).forEach(path=>{
    const sid=safeId(path);const fr=$('fi-'+sid);if(!fr)return;
    fr.classList.add('db-cached');
    const b=$('fiBadge-'+sid);if(b&&!b.classList.contains('done')&&!b.classList.contains('busy')){b.className='fi-badge db';b.textContent='DB';}
  });
}
async function loadFromDb(path){
  const sid=safeId(path);const st=getState(path);
  addLog(sid,'🗄 Neo4j DB からロード中…','l-db');setFStatus(sid,'DBロード中…','db');
  try{
    const r=await fetch(`${serverUrl()}/api/db/file?name=${encodeURIComponent(path)}`);
    if(!r.ok)throw new Error(`DB not found: ${r.status}`);
    const d=await r.json();if(d.error)throw new Error(d.error);
    st.patterns=d.patterns||[];st.csText=d.cs_text||'';st.csLinesArr=st.csText.split('\n');st.loadedFromDb=true;
    const fname=path.split('/').pop();
    renderCodeLines('csLines-'+sid,st.csLinesArr);
    const csName=fname.replace(/\.(c|pc|h)$/i,'_migrated.cs');
    $('csFname-'+sid).textContent=csName;$('csMeta-'+sid).textContent=st.csText.length.toLocaleString()+' 文字';
    if(st.csText)$('btnDlCs-'+sid).style.display='inline-block';
    if(st.patterns.length){renderCSV(path,st.patterns);$('csvBadge-'+sid).textContent=st.patterns.length;$('csvBadge-'+sid).className='badge has';$('btnDlCsv-'+sid).style.display='inline-block';showTable(sid);refreshReviewBadge(path);updateMapStatus(path);}
    for(let i=0;i<=5;i++)agSet(i,sid,'db');
    const upd=d.updated_at?new Date(d.updated_at).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    $('fElapsed-'+sid).textContent=`DB ${upd}`;
    addLog(sid,`✅ DBロード完了 — ${st.patterns.length} パターン`,'l-db');

async function deleteFromDb(path){

/* ════ TREE ════ */
function getFileIcon(ext){if(ext==='.pc')return'🗃';if(ext==='.h')return'📋';if(ext==='.pro')return'📦';return'📄';}
function getExtColor(ext){if(ext==='.pc')return'color:var(--teal)';if(ext==='.h')return'color:var(--purple)';if(ext==='.pro')return'color:var(--yellow)';return'';}
function renderTree(tree,flat){
  const c=$('fileTree');
  if(!tree||!tree.children||!tree.children.length){c.innerHTML='<div style="padding:10px;font-size:11px;color:var(--dim)">tests/ にファイルなし</div>';$('btnRunSel').disabled=true;return;}
  c.innerHTML='';renderTreeNode(tree,c,0,'');updateSelCount();reRenderDbBadges();
}
function renderTreeNode(node,pe,d,pp){
  if(node.type==='dir'){if(d===0&&node.path===''){node.children.forEach(c=>renderTreeNode(c,pe,d,''));return;}renderDirNode(node,pe,d,pp);}
  else renderFileNode(node,pe,d);
}
function renderDirNode(node,pe,depth,pp){
  const dp=node.path;if(dirOpen[dp]===undefined)dirOpen[dp]=true;
  const w=document.createElement('div');w.className='tree-dir-wrapper';
  const row=document.createElement('div');row.className='tree-dir';row.id='dir-row-'+safeId(dp);row.style.paddingLeft=(8+depth*14)+'px';
  const fc=countFiles(node),sc=countSelected(node);
  row.innerHTML=`<span class="dir-toggle ${dirOpen[dp]?'open':''}" id="dir-toggle-${safeId(dp)}">▶</span><span class="dir-icon">📁</span><span class="dir-label" title="${esc(dp)}">${esc(node.name)}</span><span class="dir-badge ${sc>0?'has-sel':''}" id="dir-badge-${safeId(dp)}">${sc>0?sc+'/':' '}${fc}</span>`;
  row.addEventListener('click',e=>{if(e.target.type==='checkbox')return;toggleDir(dp);});
  w.appendChild(row);
  const ch=document.createElement('div');ch.className='tree-children'+(dirOpen[dp]?'':' collapsed');ch.id='dir-children-'+safeId(dp);
  if(dirOpen[dp])ch.style.maxHeight='99999px';
  node.children.forEach(c=>renderTreeNode(c,ch,depth+1,dp));
  w.appendChild(ch);pe.appendChild(w);
}
function renderFileNode(node,pe,depth){
  const path=node.path,sid=safeId(path),st=getState(path),c=cache[path],isDb=!!dbCachedFiles[path];
  let bcls='',btxt=node.ext.replace('.','').toUpperCase();
  if(c){bcls='done';btxt='✓';}else if(st.running){bcls='busy';btxt='⟳';}else if(isDb){bcls='db';btxt='DB';}
  const isH=node.ext==='.h';
  const row=document.createElement('div');row.className='tree-file'+(isDb?' db-cached':'');row.id='fi-'+sid;row.style.paddingLeft=(depth*14)+'px';
  row.innerHTML=`<input type="checkbox" class="fi-cb" id="cb-${sid}" ${isH?'disabled title=".h ファイルは移行対象外"':''} onchange="onCheckChange()" onclick="e=>e.stopPropagation()"><span class="fi-icon" style="${getExtColor(node.ext)}">${getFileIcon(node.ext)}</span><span class="fi-name" title="${esc(path)}" style="${isH?'color:var(--dim)':''}">${esc(node.name)}</span><span class="fi-badge ${bcls}" id="fiBadge-${sid}">${btxt}</span>`;
  row.querySelector('.fi-name').addEventListener('click',()=>openFileView(path));
  row.querySelector('.fi-icon').addEventListener('click',()=>openFileView(path));
  pe.appendChild(row);
}
function toggleDir(dp){
  dirOpen[dp]=!dirOpen[dp];const t=$('dir-toggle-'+safeId(dp)),c=$('dir-children-'+safeId(dp));if(!t||!c)return;
  if(dirOpen[dp]){t.classList.add('open');c.classList.remove('collapsed');c.style.maxHeight='99999px';}
  else{t.classList.remove('open');c.style.maxHeight=c.scrollHeight+'px';requestAnimationFrame(()=>{c.classList.add('collapsed');});}
}
function countFiles(n){if(n.type==='file')return 1;return(n.children||[]).reduce((s,c)=>s+countFiles(c),0);}
function countSelected(n){if(n.type==='file'){const cb=$('cb-'+safeId(n.path));return cb&&cb.checked?1:0;}return(n.children||[]).reduce((s,c)=>s+countSelected(c),0);}

function onSearch(q){_searchQuery=q.toLowerCase().trim();$('fileTree').innerHTML='';_renderFilteredFlat(_searchQuery);}
let _searchQuery='';
function _renderFilteredFlat(q){
  const c=$('fileTree');if(!q){loadFileList();return;}

  c.innerHTML='';ms.forEach(f=>{
    const sid=safeId(f.path),st=getState(f.path),cv=cache[f.path],isDb=!!dbCachedFiles[f.path];
    let bcls='',btxt=f.ext.replace('.','').toUpperCase();
    if(cv){bcls='done';btxt='✓';}else if(st.running){bcls='busy';btxt='⟳';}else if(isDb){bcls='db';btxt='DB';}
    const isH=f.ext==='.h';const row=document.createElement('div');row.className='tree-file'+(isDb?' db-cached':'');row.id='fi-'+sid;row.style.paddingLeft='8px';
    row.innerHTML=`<input type="checkbox" class="fi-cb" id="cb-${sid}" ${isH?'disabled':''} onchange="onCheckChange()" onclick="e=>e.stopPropagation()"><span class="fi-icon" style="${getExtColor(f.ext)}">${getFileIcon(f.ext)}</span><span class="fi-name" title="${esc(f.path)}">${esc(f.path)}</span><span class="fi-badge ${bcls}" id="fiBadge-${sid}">${btxt}</span>`;
    row.querySelector('.fi-name').addEventListener('click',()=>openFileView(f.path));c.appendChild(row);
  });
}

/* ════ CHECK ════ */
function onCheckChange(){

  $('selCount').textContent=ck?`${ck}/${tot} 選択`:'';$('btnRunSel').disabled=ck===0;

  seen.forEach(dp=>{const b=$('dir-badge-'+safeId(dp));if(!b)return;const inD=_flatFiles.filter(f=>f.path.startsWith(dp+'/'));const sc=inD.filter(f=>{const cb=$('cb-'+safeId(f.path));return cb&&cb.checked;}).length;const tot=inD.length;b.className='dir-badge'+(sc>0?' has-sel':'');b.textContent=sc>0?`${sc}/${tot}`:String(tot);});
}
function updateSelCount(){onCheckChange();}
function toggleSelectAll(){const cbs=[...document.querySelectorAll('.fi-cb:not(:disabled)')];const all=cbs.every(c=>c.checked);cbs.forEach(c=>c.checked=!all);onCheckChange();}

/* ════ PANEL ════ */
function openFileView(path){
  const sid=safeId(path);
  if(!$('panel-'+sid)){createPanel(path);loadSourceIntoPanel(path);if(dbCachedFiles[path])loadFromDb(path);else if(cache[path])restoreCache(path);}
  switchToPanel(sid);document.querySelectorAll('.tree-file').forEach(el=>el.classList.remove('active-view'));$('fi-'+sid)?.classList.add('active-view');
}
function switchToPanel(sid){document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));$('panel-'+sid)?.classList.add('active');activePanel=sid;document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));$('tab-'+sid)?.classList.add('active');}
function createPanel(path){
  const sid=safeId(path),fname=path.split('/').pop();
  const tpl=$('panelTpl'),clone=tpl.content.cloneNode(true);
  clone.querySelectorAll('[id]').forEach(el=>{el.id=el.id.replace(/__SID__/g,sid);});
  clone.querySelectorAll('[onclick]').forEach(el=>{const v=el.getAttribute('onclick').replace(/__PATH__/g,path.replace(/'/g,"\\'")).replace(/__SID__/g,sid);el.setAttribute('onclick',v);});
  clone.querySelectorAll('[id^="srcName-"]').forEach(el=>{if(el.id==='srcName-'+sid)el.textContent=fname;});

  $('viewPanels').appendChild(clone);createTab(path,sid,fname);setupResize(sid);
}
function createTab(path,sid,fname){
  $('tabBarEmpty')?.remove();const tab=document.createElement('div');tab.className='view-tab';tab.id='tab-'+sid;tab.onclick=()=>switchToPanel(sid);
  tab.innerHTML=`<span class="tab-dot dot-idle" id="tabDot-${sid}"></span><span title="${esc(path)}">${esc(fname)}</span><span class="tab-close" onclick="closePanel('${path.replace(/'/g,"\\'")}',event)">✕</span>`;

function closePanel(path,e){

  if(activePanel===sid){const rem=document.querySelectorAll('.view-tab');if(rem.length>0)rem[rem.length-1].click();else{switchToPanel('welcome');$('tabBar').innerHTML='<div class="tab-bar-empty" id="tabBarEmpty">← ファイルを選択して開く</div>';activePanel='welcome';}}
}
async function loadSourceIntoPanel(path){
  const sid=safeId(path);
  try{const r=await fetch(`${serverUrl()}/api/file?name=${encodeURIComponent(path)}`);const d=await r.json();if(d.error)throw new Error(d.error);const st=getState(path);st.srcLines=d.content.split('\n');renderCodeLines('srcLines-'+sid,st.srcLines);$('srcMeta-'+sid).textContent=`${st.srcLines.length}行 · ${(d.size/1024).toFixed(1)}KB`;}

/* ════ RUN ════ */
function runSelected(){const ck=[...document.querySelectorAll('.fi-cb:not(:disabled):checked')];if(!ck.length)return;ck.forEach(cb=>{const row=cb.closest('.tree-file');if(!row)return;const name=row.querySelector('.fi-name')?.getAttribute('title')||row.querySelector('.fi-name')?.textContent;if(name){openFileView(name);startOne(name);}});}

function startOne(path){
  const sid=safeId(path),st=getState(path);if(st.running)return;
  st.running=true;st.startTs=Date.now();st.reviews={};st.hasDeps=false;st.depRetryCount=0;st.loadedFromDb=false;
  if(st.depRetryTimer){clearTimeout(st.depRetryTimer);st.depRetryTimer=null;}
  setTabDot(sid,'run');setBadge(path,'busy','⟳');$('btnRun-'+sid).disabled=true;$('btnCancel-'+sid).style.display='inline-block';
  $('fElapsed-'+sid).textContent='';setFStatus(sid,'実行中…','run');showLog(sid);
  for(let i=0;i<=5;i++)agSet(i,sid,'');
  const csEl=$('csLines-'+sid);if(csEl)csEl.innerHTML='<div style="padding:12px 14px;color:var(--dim)">// 生成中…</div>';
  const sb=$('fSrcBadge-'+sid);if(sb)sb.style.display='none';
  addLog(sid,`▶ 開始: ${path}`,'l-step');
  if(st.sse)st.sse.close();
  const sse=new EventSource(`${serverUrl()}/api/migrate?name=${encodeURIComponent(path)}`);st.sse=sse;
  sse.onmessage=ev=>{let ev2;try{ev2=JSON.parse(ev.data);}catch(_){addLog(sid,'⚠ '+ev.data,'l-warn');return;}handleEvent(path,ev2);};
  sse.onerror=()=>{if(!st.running)return;addLog(sid,'❌ SSE 接続が切断されました','l-err');setFStatus(sid,'接続エラー','err');finishOne(path,false);};
}
function cancelOne(path){const sid=safeId(path),st=getState(path);if(st.sse){st.sse.close();st.sse=null;}addLog(sid,'⚠ キャンセルされました','l-warn');setFStatus(sid,'キャンセル');finishOne(path,false);}

function handleEvent(path,ev){
  const sid=safeId(path),st=getState(path);
  switch(ev.type){
    case 'step':agsDone(sid,ev.step);addLog(sid,`▶ ステップ ${ev.step}/5 — ${ev.label}`,'l-step');setFStatus(sid,`Step ${ev.step}/5: ${ev.label}`,'run');break;
    case 'log':{
      const m=ev.msg||'',tag=ev.tag||'';
      if(tag==='misc'&&!/Step|Pipeline|pattern|extract|classif|translat/i.test(m))break;
      let cls='';
      if(ev.level==='error')cls='l-err';else if(ev.level==='warn')cls='l-warn';
      else if(tag==='batch_ok')cls='l-ok';else if(tag==='api'||tag==='agent')cls='l-sub';
      else if(tag==='pipeline')cls='l-step';else if(tag==='db'||tag==='callgraph')cls='l-db';
      addLog(sid,m,cls);break;
    }
    case 'done':{
      st.sse.close();st.sse=null;st.patterns=ev.patterns||[];
      for(let i=0;i<=5;i++)agSet(i,sid,i===4?'nollm':'done');
      const fname=path.split('/').pop();
      fetch(`${serverUrl()}/api/output?name=${encodeURIComponent(path)}`).then(r=>r.text()).then(cs=>{
        st.csText=cs;st.csLinesArr=cs.split('\n');
        renderCodeLines('csLines-'+sid,st.csLinesArr);
        const csName=fname.replace(/\.(c|pc|h)$/i,'_migrated.cs');
        $('csFname-'+sid).textContent=csName;$('csMeta-'+sid).textContent=cs.length.toLocaleString()+' 文字';
        $('btnDlCs-'+sid).style.display='inline-block';$('btnDlCsv-'+sid).style.display='inline-block';
        renderCSV(path,st.patterns);$('csvBadge-'+sid).textContent=st.patterns.length;$('csvBadge-'+sid).className='badge has';
        cache[path]={patterns:st.patterns,cs};
        const elapsed=((Date.now()-st.startTs)/1000).toFixed(1);
        $('fElapsed-'+sid).textContent=`✓ ${elapsed}s`;
        addLog(sid,`✅ 完了 — ${st.patterns.length} パターン · ${elapsed}s`,'l-ok');
        setFStatus(sid,`✓ ${st.patterns.length} パターン · ${elapsed}s`,'ok');
        setBadge(path,'done','✓');setTabDot(sid,'done');
        updateMapStatus(path);
        const sb=$('fSrcBadge-'+sid);if(sb){sb.className='f-src-badge from-run';sb.textContent='▶ 実行済み';sb.style.display='inline-block';}
        refreshReviewBadge(path);finishOne(path,true);showTable(sid);loadFileList();pingServer();
        setTimeout(async()=>{await loadDbFileList();dbCachedFiles[path]={path,pattern_count:st.patterns.length};reRenderDbBadges();const db=$('btnDbDel-'+sid);if(db)db.style.display='inline-block';},2000);
        loadDependencies(path,0);
      }).catch(e=>{addLog(sid,`⚠ .cs 取得エラー: ${e.message}`,'l-warn');renderCSV(path,st.patterns);finishOne(path,true);showTable(sid);});
      break;
    }
    case 'error':{st.sse.close();st.sse=null;addLog(sid,`❌ ${ev.msg}`,'l-err');if(ev.trace)addLog(sid,ev.trace.split('\n').slice(-3).join(' '),'l-err');setFStatus(sid,'パイプラインエラー','err');setBadge(path,'err','✗');setTabDot(sid,'err');finishOne(path,false);break;}
  }
}
function finishOne(path,ok){const sid=safeId(path),st=getState(path);st.running=false;st.sse=null;$('btnRun-'+sid).disabled=false;$('btnCancel-'+sid).style.display='none';if(!ok&&!($('fiBadge-'+safeId(path))?.classList.contains('done')))setTabDot(sid,'err');}

function restoreCache(path){
  const sid=safeId(path),c=cache[path];if(!c)return;
  const st=getState(path),fname=path.split('/').pop();
  st.patterns=c.patterns;st.csText=c.cs;st.csLinesArr=c.cs.split('\n');
  renderCodeLines('csLines-'+sid,st.csLinesArr);renderCSV(path,st.patterns);
  $('csFname-'+sid).textContent=fname.replace(/\.(c|pc|h)$/i,'_migrated.cs');$('csMeta-'+sid).textContent=c.cs.length.toLocaleString()+' 文字';
  $('csvBadge-'+sid).textContent=st.patterns.length;$('csvBadge-'+sid).className='badge has';
  $('btnDlCs-'+sid).style.display='inline-block';$('btnDlCsv-'+sid).style.display='inline-block';
  for(let i=0;i<=5;i++)agSet(i,sid,i===4?'nollm':'done');
  setFStatus(sid,`キャッシュ済み — ${st.patterns.length} パターン`,'ok');setTabDot(sid,'done');setBadge(path,'done','✓');
  refreshReviewBadge(path);showTable(sid);updateMapStatus(path);
  const ext=fname.split('.').pop().toLowerCase();if(ext!=='h')loadDependencies(path,0);
}
function clearOne(path){
  const sid=safeId(path),st=getState(path);
  if(st.sse){st.sse.close();st.sse=null;}if(st.depRetryTimer){clearTimeout(st.depRetryTimer);st.depRetryTimer=null;}
  st.patterns=[];st.csText='';st.csLinesArr=[];st.reviews={};st.hasDeps=false;st.depRetryCount=0;st.loadedFromDb=false;closeReview(path);
  $('logScroll-'+sid).innerHTML=`<div class="empty-state" id="logEmpty-${sid}"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><div>▶ 実行 ボタンを押して開始</div></div>`;
  showLog(sid);$('csvBadge-'+sid).textContent='0';$('csvBadge-'+sid).className='badge';$('reviewBadge-'+sid).style.display='none';$('depBadge-'+sid).style.display='none';
  const csEl=$('csLines-'+sid);if(csEl)csEl.innerHTML='<div style="padding:12px 14px;color:var(--dim)">// C# の出力がここに表示されます</div>';
  $('csFname-'+sid).textContent='—';$('csMeta-'+sid).textContent='';$('btnDlCs-'+sid).style.display='none';$('btnDlCsv-'+sid).style.display='none';$('btnDbDel-'+sid).style.display='none';$('fSrcBadge-'+sid).style.display='none';$('fElapsed-'+sid).textContent='';
  const ms=$('mapStatus-'+sid);if(ms)ms.textContent='';
  for(let i=0;i<=5;i++)agSet(i,sid,'');setFStatus(sid,'準備完了');setTabDot(sid,'idle');setBadge(path,'','?');delete cache[path];
}

/* ════ CALL GRAPH ════ */
function triggerCallGraph(){
  const btn=$('btnCallGraph');if(btn.classList.contains('running'))return;
  btn.classList.add('running');btn.textContent='⇄ 分析中…';btn.disabled=true;
  const sse=new EventSource(serverUrl()+'/api/call-graph?t='+Date.now());
  sse.onmessage=ev=>{let e;try{e=JSON.parse(ev.data);}catch(_){return;}if(e.type==='log')console.log('[CG]',e.msg);if(e.type==='done'){sse.close();btn.classList.remove('running');btn.textContent='⇄ 依存関係分析';btn.disabled=false;Object.keys(fileStates).forEach(p=>loadDependencies(p,0));}if(e.type==='error'){sse.close();btn.classList.remove('running');btn.textContent='⇄ 依存関係分析';btn.disabled=false;}};
  sse.onerror=()=>{sse.close();btn.classList.remove('running');btn.textContent='⇄ 依存関係分析';btn.disabled=false;};
}
async function loadDependencies(path,retryCount){
  const sid=safeId(path),st=getState(path);if(path.endsWith('.h'))return;
  if(retryCount===0&&st.depRetryTimer){clearTimeout(st.depRetryTimer);st.depRetryTimer=null;}
  try{
    const r=await fetch(`${serverUrl()}/api/call-graph/file?name=${encodeURIComponent(path)}`);
    if(r.status===202){if(retryCount<CG_RETRY_MAX){setDepBadgePending(sid);st.depRetryCount=retryCount+1;st.depRetryTimer=setTimeout(()=>loadDependencies(path,retryCount+1),CG_RETRY_DELAY_MS);}else{const b=$('depBadge-'+sid);if(b)b.style.display='none';}return;}
    if(!r.ok)return;const d=await r.json();if(d.error)return;
    if(st.depRetryTimer){clearTimeout(st.depRetryTimer);st.depRetryTimer=null;}
    st.hasDeps=true;st.depRetryCount=0;
    const dm={};d.patterns.forEach(p=>dm[p.id]=p);st.patterns=st.patterns.map(p=>({...p,...(dm[p.id]||{})}));
    const b=$('depBadge-'+sid);
    if(b){
      const s=d.summary||{};
      const fc=s.total_func_calls||0,cr=s.total_func_creates||0;
      const total=(s.total_callees||0)+(s.total_callers||0);
      b.style.display='inline-block';b.className='badge dep';
      b.title=`calls:${fc} creates:${cr}`;
      b.textContent=`⇄ ${total} deps (▸${fc}c ${cr}cr)`;
    }
    renderCSV(path,st.patterns);if(st.activeReviewId!=null)renderReviewFkDeps(path,st.activeReviewId);
  }catch(e){console.debug('[CG]',e.message);}
}

function highlightLines(containerId,startLine,endLine,scroll=true,colorClass=''){
  const c=$(containerId);if(!c)return;
  const activeClass=colorClass==='cs'?'hl-cs-active':'hl-active';

  });

function findCsLinesForPattern(path,pattern){
  const st=getState(path);
  if(pattern.cs_line_start&&pattern.cs_line_start>0)return[pattern.cs_line_start,pattern.cs_line_end||pattern.cs_line_start];
  const marker=`// ── Pattern #${pattern.id} [L`;
  for(let i=0;i<st.csLinesArr.length;i++){if(st.csLinesArr[i].includes(marker)){let endLine=i+1;for(let j=i+1;j<st.csLinesArr.length&&j<i+50;j++){if(st.csLinesArr[j].includes('// ── Pattern #')||st.csLinesArr[j].includes('} // end')){endLine=j-1;break;}endLine=j;}return[i+1,endLine+1];}}
  return findSnippetLines(pattern.csharp_snippet||'',st.csLinesArr);
}
function findSnippetLines(snippet,linesArr){
  if(!snippet||!linesArr.length)return null;
  const sl=snippet.split('\n');
  const anchor=sl.find(l=>{const t=l.trim();return t.length>3&&!/^[{}()\s*\/]+$/.test(t);})||sl.find(l=>l.trim())||'';
  if(!anchor.trim())return null;
  const at=anchor.trim();for(let i=0;i<linesArr.length;i++)if(linesArr[i].includes(at))return[i+1,i+sl.length];
  return null;
}
function findSrcLines(path,pattern){
  const st=getState(path);
  const[sl,el]=pattern.line_range||[0,0];
  if(sl>0&&el>=sl&&st.srcLines.length>0){const snippet=(pattern.source_snippet||'').trim();const fw=snippet.split(/\W+/).find(w=>w.length>2)||'';const rt=st.srcLines.slice(sl-1,el).join('\n');if(!fw||rt.includes(fw))return[sl,el];}
  return findSnippetLines(pattern.source_snippet||'',st.srcLines);
}

function saveReview(path){

function dlCSV(path){
  const st=getState(path);if(!st.patterns.length)return;
  const e2=v=>'"'+String(v).replace(/"/g,'""')+'"';const sm={ok:'承認',fix:'要修正',reject:'却下'};
  const ec=[...COLS.filter(c=>c.k!=='_review'&&c.k!=='_callees'&&c.k!=='_callers'&&c.k!=='_cs_map'),

    {k:'_callees_str',h:'Callees'},{k:'_callers_str',h:'Callers'},{k:'_rv_status',h:'レビューステータス'}];
  const hdr=ec.map(c=>e2(c.h)).join(',');
  const rows=st.patterns.map(p=>{const rv=st.reviews[p.id]||{};return ec.map(col=>{
    if(col.k==='_rv_status')return e2(sm[rv.status]||'未レビュー');
    if(col.k==='_callees_str')return e2((p.callees||[]).filter(c=>c.kind!=='stdlib').map(c=>`${c.name}[${c.func_kind||'call'}](${c.file||c.kind})`).join('; '));
    if(col.k==='_callers_str')return e2((p.callers||[]).map(c=>`${c.caller_func||'?'}@${c.file}:${c.line}`).join('; '));
    if(col.k==='func_calls')return e2(Array.isArray(p.func_calls)?p.func_calls.join('; '):'');
    if(col.k==='func_creates')return e2(Array.isArray(p.func_creates)?p.func_creates.join('; '):'');
    let v=p[col.k];if(Array.isArray(v))v=v.join('; ');else if(col.k==='csharp_popularity')v=v!=null?`${v}/5`:'';else if(col.k==='needs_review')v=v?'要確認':'';else v=v??'';return e2(v);
  }).join(',');});
  _dl('\uFEFF'+[hdr,...rows].join('\n'),path.split('/').pop().replace(/\.(c|pc|h)$/i,'_patterns.csv'),'text/csv');
}
function _dl(content,filename,mime){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=filename;a.click();}

/* ════ RESIZE ════ */
function setupResize(sid){
  const handle=$('resizeH-'+sid),topSec=$('topSection-'+sid);if(!handle||!topSec)return;
  const workspace=topSec.closest('.view-panel');let dragging=false,startY=0,startH=0;
  handle.addEventListener('mousedown',e=>{dragging=true;startY=e.clientY;startH=topSec.getBoundingClientRect().height;handle.classList.add('dragging');document.body.style.userSelect='none';document.body.style.cursor='row-resize';});
  document.addEventListener('mousemove',e=>{if(!dragging)return;const wsH=workspace.getBoundingClientRect().height;const newH=Math.max(100,Math.min(wsH-100,startH+(e.clientY-startY)));topSec.style.flex=`0 0 ${(newH/wsH*100).toFixed(1)}%`;});
  document.addEventListener('mouseup',()=>{if(!dragging)return;dragging=false;handle.classList.remove('dragging');document.body.style.userSelect='';document.body.style.cursor='';});
}

/* ════ UI HELPERS ════ */
function agSet(idx,sid,state){const el=$(`ag${idx}-${sid}`);if(!el)return;el.classList.remove('run','done','err','db','nollm');if(state)el.classList.add(state);}
function agsDone(sid,upTo){for(let i=0;i<=5;i++)agSet(i,sid,i<upTo?'done':i===upTo?'run':'');}
function setTabDot(sid,state){const el=$('tabDot-'+sid);if(!el)return;el.className='tab-dot dot-'+state;}
function setBadge(path,cls,txt){const sid=safeId(path),el=$('fiBadge-'+sid);if(!el)return;el.className='fi-badge'+(cls?' '+cls:'');el.textContent=txt;}
function setFStatus(sid,msg,cls=''){const el=$('fStatus-'+sid);if(!el)return;el.textContent=msg;el.className='f-status'+(cls?' '+cls:'');}
function addLog(sid,msg,cls=''){const wrap=$('logScroll-'+sid);if(!wrap)return;$('logEmpty-'+sid)?.remove();const line=document.createElement('div');line.className='log-line';line.innerHTML=`<span class="log-ts">${ts()}</span><span class="log-msg ${cls}">${esc(msg)}</span>`;wrap.appendChild(line);wrap.scrollTop=wrap.scrollHeight;}
function showTable(sid){$('logOverlay-'+sid)?.classList.remove('visible');$('tblWrap-'+sid)?.classList.add('visible');}
function showLog(sid){$('tblWrap-'+sid)?.classList.remove('visible');$('logOverlay-'+sid)?.classList.add('visible');}

pingServer();
setInterval(pingServer,POLL_MS);
setInterval(loadDbFileList,60000);
